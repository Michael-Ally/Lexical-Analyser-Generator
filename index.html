<!DOCTYPE html>
<html lang="en">
<head>
    <title>LexiGen | Compiler Front-End</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app">

    <nav class="topbar">
        <div class="brand">
            <div class="brand-dot"></div>
            <span class="brand-title">LexiGen <span class="brand-version">v1.0</span></span>
        </div>
        <div class="actions">
            <button id="btn-generate" class="btn-primary">Generate Automata</button>
            <button id="btn-scan" class="btn-secondary">Run Tokenizer</button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <section class="panel">
                <label class="label">Regular Definitions</label>
                <textarea id="regex-input" class="code-input" placeholder="letter [a-zA-Z]\ndigit [0-9]\nid {letter}({letter}|{digit})*"></textarea>
            </section>
            
            <section class="panel">
                <label class="label">Test Source Code</label>
                <textarea id="source-input" class="code-input" placeholder="while (x > 0) { ... }"></textarea>
            </section>
        </aside>

        <main class="main">
            <div id="cy" class="cy-container"></div>

            <div class="results-panel">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Lexeme</th>
                            <th>Token</th>
                            <th>Line</th>
                        </tr>
                    </thead>
                    <tbody id="token-results" class="font-mono small-text">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
