<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compiler Design PBL</title>
<link rel="stylesheet" href="main.css">
</head>
<body>

<div class="container">

    <!-- Left Panel -->
    <div class="left-panel">
        <h3>Source Code</h3>

        <!-- Input Options -->
        <div class="input-options">
            <label><input type="radio" name="inputType" value="type" checked> Type</label>
            <label><input type="radio" name="inputType" value="paste"> Paste</label>
            <label><input type="radio" name="inputType" value="file"> Upload</label>
        </div>

        <!-- Text Area -->
        <textarea id="codeArea" placeholder="Type or paste your source code here..."></textarea>

        <!-- File Upload -->
        <input type="file" id="fileInput" accept=".txt,.c,.cpp,.java,.py" hidden>

        <div class="tabs">
            <button>Lex Definitions</button>
        </div>

        <div class="box">
            <h4>Regular Definitions</h4>
            <textarea placeholder="Enter regex rules..."></textarea>
        </div>
    </div>

    <!-- Center Panel -->
    <div class="center-panel">

        <div class="top-buttons">
            <button class="blue">Generate DFA</button>
        </div>

        <div class="automaton">
            <h3>Lex Automaton</h3>
            <div class="states">
                <!-- DFA Visualization here -->
            </div>
        </div>

        <div class="table-box">
            <h3>Token Table</h3>
            <table>
                <tr>
                    <th>LEXEME</th>
                    <th>TOKEN</th>
                    <th>LINE</th>
                </tr>
            </table>
        </div>

    </div>

    <!-- Right Panel -->
    <div class="right-panel">

        <div class="top-buttons">
            <button class="green">Generate Parse Tree</button>
        </div>

        <h3>Parse Tree</h3>
        <div class="tree">
            <!-- Parse tree visualization here -->
        </div>

        <div class="output-box">
            <h3>Output</h3>
            <table>
                <tr>
                    <th>LEXEME</th>
                    <th>TOKEN</th>
                    <th>LINE</th>
                </tr>
            </table>
        </div>

    </div>

</div>
<script src="main.js"></script>
</body>
</html>
